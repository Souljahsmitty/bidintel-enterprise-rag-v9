services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: bidintel
    volumes:
      - ./backend/scripts/create_tables.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/app/database/migrations/003_enterprise_tables.sql:/docker-entrypoint-initdb.d/02_enterprise.sql

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:bidintel@db:5432/postgres
      BEDROCK_MODEL_ID: mock-claude
    ports: ["8000:8000"]
    depends_on: [db]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
