<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BidIntel — Compliance</title><link rel="stylesheet" href="styles.css"/></head>
<body>
<script src="api.js"></script><script src="layout.js"></script>
<script>requireAuth(); renderLayout("Compliance Matrix");</script>
<script>
  document.getElementById("page").innerHTML = `<h1>Compliance Matrix</h1>
    <p class="sub">Requirements auto-extracted from the RFP, each linked to evidence and risk.</p>
    <div class="card"><table><thead><tr><th>ID</th><th>§</th><th>Requirement</th><th>Owner</th><th>Risk</th><th>Status</th></tr></thead>
    <tbody id="rows"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody></table></div>`;
  apiGet("/compliance/dhs-cyber").then(d=>{
    const r=d.requirements||[];
    document.getElementById("rows").innerHTML = r.length ? r.map(x=>
      `<tr><td>${x.id}</td><td>${x.section}</td><td>${x.text}</td><td>${x.owner}</td>
       <td><span class="pill ${x.risk}">${x.risk}</span></td><td>${x.status}</td></tr>`).join("")
      : `<tr><td colspan="6" class="muted">No requirements yet — ingest an RFP first.</td></tr>`;
  }).catch(()=>{document.getElementById("rows").innerHTML='<tr><td colspan="6" class="muted">Start the backend to load the matrix.</td></tr>';});
</script></body></html>
